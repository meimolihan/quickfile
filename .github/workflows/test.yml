name: sdk24 build

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: '标记为预发布版本'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        sdk:
          - "24.10"

    steps:
      - uses: actions/checkout@v6

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-openwrt-${{ matrix.sdk }}
          FEEDNAME: quickfile
          PACKAGES: quickfile luci-app-quickfile
          NO_REFRESH_CHECK: true
          INDEX: 1

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find bin -type f \( -name "*.apk" -o -name "*.ipk" \) -exec cp -v {} dist/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.sdk }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: build-*

      - name: Flatten files
        run: |
          mkdir -p release
          find dist -type f \( -name "*.apk" -o -name "*.ipk" \) -exec cp -v {} release/ \;

      - name: Generate tag
        id: tag
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)" >> $GITHUB_OUTPUT
          echo "prerelease=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
